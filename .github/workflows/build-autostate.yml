# .github/workflows/build-autostate.yml
#
# Builds the patched mgba_libretro core for:
#   • Windows 64-bit  (MinGW cross-compile on Ubuntu)
#   • Windows 32-bit  (MinGW cross-compile on Ubuntu)
#   • Linux 64-bit
#   • Android arm64-v8a
#   • Android armeabi-v7a
#   • Android x86_64
#
# Artifacts are uploaded so you can download them directly from the
# GitHub Actions run page without needing a release.
#
# Trigger: every push and pull-request, plus manual dispatch.
#
# Android build note:
#   The Android NDK provides strtof_l() natively. When building with
#   platform=unix the Makefile adds -DHAVE_LOCALE but not -DHAVE_STRTOF_L,
#   causing mGBA's own strtof_l definition (src/util/formatting.c) to
#   conflict with the NDK's inline version. We pass PLATFORM_DEFINES with
#   -DHAVE_STRTOF_L (and -DHAVE_USELOCALE for proper locale switching)
#   to skip mGBA's duplicate definitions.

name: Build mGBA autostate

on:
  push:
  pull_request:
  workflow_dispatch:      # allows one-click manual runs from the Actions tab

jobs:
  # ------------------------------------------------------------------ #
  # Windows 64-bit (MinGW cross-compile)                               #
  # ------------------------------------------------------------------ #
  build-win64:
    name: Windows x64 (MinGW)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MinGW-w64 toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc-mingw-w64-x86-64 \
            g++-mingw-w64-x86-64 \
            make

      - name: Build
        run: |
          make -f Makefile.libretro \
               platform=win \
               CC=x86_64-w64-mingw32-gcc \
               CXX=x86_64-w64-mingw32-g++ \
               -j$(nproc)

      - name: Rename artifact
        run: mv mgba_libretro.dll mgba_libretro_win64.dll 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mgba_libretro_win64
          path: mgba_libretro_win64.dll

  # ------------------------------------------------------------------ #
  # Windows 32-bit (MinGW cross-compile)                               #
  # ------------------------------------------------------------------ #
  build-win32:
    name: Windows x86 (MinGW)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MinGW-w64 toolchain (32-bit)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc-mingw-w64-i686 \
            g++-mingw-w64-i686 \
            make

      - name: Build
        run: |
          make -f Makefile.libretro \
               platform=win \
               CC=i686-w64-mingw32-gcc \
               CXX=i686-w64-mingw32-g++ \
               -j$(nproc)

      - name: Rename artifact
        run: mv mgba_libretro.dll mgba_libretro_win32.dll 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mgba_libretro_win32
          path: mgba_libretro_win32.dll

  # ------------------------------------------------------------------ #
  # Linux 64-bit                                                       #
  # ------------------------------------------------------------------ #
  build-linux64:
    name: Linux x64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            make

      - name: Build
        run: |
          make -f Makefile.libretro \
               platform=unix \
               LDFLAGS="-ldl" \
               -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mgba_libretro_linux64
          path: mgba_libretro.so

  # ------------------------------------------------------------------ #
  # Android — arm64-v8a / armeabi-v7a / x86_64                        #
  #                                                                    #
  # The mGBA Makefile.libretro uses platform=unix for Android NDK     #
  # cross-compile. We override CC/CXX with NDK Clang and drop the     #
  # version-script from SHARED (Android linker does not support it).   #
  # The -ldl flag links libdl which provides dladdr() used by the      #
  # autoload block to locate the core's own .so path at runtime.       #
  # ------------------------------------------------------------------ #
  build-android:
    name: Android ${{ matrix.abi }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            ndk_target: aarch64-linux-android
            artifact_suffix: android_arm64-v8a

          - abi: armeabi-v7a
            ndk_target: armv7a-linux-androideabi
            artifact_suffix: android_armeabi-v7a

          - abi: x86_64
            ndk_target: x86_64-linux-android
            artifact_suffix: android_x86_64

    env:
      ANDROID_API: 21
      NDK_VERSION: "26.3.11579264"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install NDK
        run: |
          yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager \
            "ndk;${{ env.NDK_VERSION }}" 2>&1 | tail -3
          echo "NDK_ROOT=${ANDROID_HOME}/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV

      - name: Install make
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends make

      - name: Build
        run: |
          TOOLCHAIN=${NDK_ROOT}/toolchains/llvm/prebuilt/linux-x86_64
          CC="${TOOLCHAIN}/bin/${{ matrix.ndk_target }}${{ env.ANDROID_API }}-clang"
          CXX="${TOOLCHAIN}/bin/${{ matrix.ndk_target }}${{ env.ANDROID_API }}-clang++"
          AR="${TOOLCHAIN}/bin/llvm-ar"
          RANLIB="${TOOLCHAIN}/bin/llvm-ranlib"
          STRIP="${TOOLCHAIN}/bin/llvm-strip"

          # platform=unix sets TARGET=mgba_libretro.so and fpic=-fPIC
          # We override SHARED: Android linker doesn't support --version-script
          # -ldl is essential for dladdr() used by autoload self-detection
          #
          # PLATFORM_DEFINES notes for Android NDK:
          #   -DHAVE_STRTOF_L : Android NDK already provides strtof_l() as an
          #     inline in <legacy_stdlib_inlines.h>; without this define mGBA's
          #     own copy in src/util/formatting.c causes a redefinition error.
          #   -DHAVE_USELOCALE : Android NDK API 21+ provides uselocale() /
          #     newlocale() / freelocale(), so ftostr_l() can switch locales
          #     properly instead of silently ignoring the locale argument.
          make -f Makefile.libretro \
            platform=unix \
            CC="$CC" \
            CXX="$CXX" \
            AR="$AR" \
            RANLIB="$RANLIB" \
            STRIP="$STRIP" \
            SHARED="-shared -fPIC" \
            PLATFORM_DEFINES="-DHAVE_STRTOF_L -DHAVE_USELOCALE" \
            LDFLAGS="-ldl" \
            -j$(nproc)

      - name: Stage artifact
        run: |
          cp mgba_libretro.so mgba_libretro_${{ matrix.artifact_suffix }}.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mgba_libretro_${{ matrix.artifact_suffix }}
          path: mgba_libretro_${{ matrix.artifact_suffix }}.so
